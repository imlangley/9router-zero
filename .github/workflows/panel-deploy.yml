name: Build and deploy panel

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: panel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PANEL_VOLUME: /var/lib/pelican/volumes/021c7ce0-b861-45f5-95d9-7d0774552c15
  PANEL_CONTAINER: 021c7ce0-b861-45f5-95d9-7d0774552c15

jobs:
  build:
    name: Build standalone artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --include=optional
          else
            npm install --include=optional
          fi

      - name: Build Next.js standalone app
        run: npm run build

      - name: Assemble deploy artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf panel-artifact
          mkdir -p panel-artifact/.next
          cp -a .next/standalone panel-artifact/.next/standalone
          cp -a .next/static panel-artifact/.next/static
          cp -a public panel-artifact/public
          mkdir -p panel-artifact/.next/standalone/.next
          cp -a .next/static panel-artifact/.next/standalone/.next/static
          cp -a public panel-artifact/.next/standalone/public
          cp -a scripts panel-artifact/scripts
          cp -a package.json panel-artifact/package.json
          cp -a next.config.mjs panel-artifact/next.config.mjs
          cp -a postcss.config.mjs panel-artifact/postcss.config.mjs
          cp -a jsconfig.json panel-artifact/jsconfig.json
          cp -a open-sse panel-artifact/open-sse
          cp -a i18n panel-artifact/i18n
          cp -a assets panel-artifact/assets
          cp -a images panel-artifact/images
          if [ -f .env.example ]; then cp -a .env.example panel-artifact/.env.example; fi
          tar -C panel-artifact -czf panel-artifact.tar.gz .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: panel-artifact
          path: panel-artifact.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy artifact to panel VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: panel-artifact

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PANEL_SSH_KEY }}" > ~/.ssh/panel_key
          chmod 600 ~/.ssh/panel_key
          ssh-keyscan -H "${{ secrets.PANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to VPS
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/panel_key panel-artifact.tar.gz "${{ secrets.PANEL_SSH_USER }}@${{ secrets.PANEL_SSH_HOST }}:/tmp/9router-panel-${{ github.sha }}.tar.gz"

      - name: Activate release and restart panel
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/panel_key "${{ secrets.PANEL_SSH_USER }}@${{ secrets.PANEL_SSH_HOST }}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          PANEL_VOLUME="/var/lib/pelican/volumes/021c7ce0-b861-45f5-95d9-7d0774552c15"
          PANEL_CONTAINER="021c7ce0-b861-45f5-95d9-7d0774552c15"
          RELEASE_ID="${{ github.sha }}"
          ARTIFACT="/tmp/9router-panel-${{ github.sha }}.tar.gz"
          RELEASE_ROOT="/tmp/9router-panel-release-${RELEASE_ID}"

          rm -rf "$RELEASE_ROOT"
          mkdir -p "$RELEASE_ROOT"
          tar -xzf "$ARTIFACT" -C "$RELEASE_ROOT"

          sudo -n test -d "$PANEL_VOLUME"

          # Preserve runtime state owned by the panel/container.
          sudo -n mkdir -p "$PANEL_VOLUME/.9router" "$PANEL_VOLUME/.cache" "$PANEL_VOLUME/.playwright-libs"

          # Remove app/build files only. Keep runtime data, env, caches, browser libs, and node_modules intact.
          sudo -n find "$PANEL_VOLUME" -mindepth 1 -maxdepth 1 \
            ! -name '.9router' \
            ! -name '.env' \
            ! -name 'node_modules' \
            ! -name '.next' \
            ! -name '.npm' \
            ! -name '.cache' \
            ! -name '.playwright-libs' \
            ! -name '.config' \
            -exec rm -rf {} +

          # Replace prebuilt Next output atomically enough for this single-container deployment.
          sudo -n rm -rf "$PANEL_VOLUME/.next"
          sudo -n mkdir -p "$PANEL_VOLUME/.next"
          sudo -n cp -a "$RELEASE_ROOT/." "$PANEL_VOLUME/"

          sudo -n chown -R pelican:pelican "$PANEL_VOLUME"
          sudo -n docker restart "$PANEL_CONTAINER"

          rm -rf "$RELEASE_ROOT" "$ARTIFACT"
          REMOTE

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl -fsS "https://ai.langley.page/api/health"; then
              echo "Panel health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Panel health check failed" >&2
          exit 1
